<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<!-- 共通ヘッダー -->
<header id="app-header" style="display:none;">
    <div class="header-logo"><i class="fa-solid fa-cube"></i> Knowledge DB</div>
    <div class="header-user">
        <span id="header-user-info"></span>
        <button onclick="logout()" class="header-logout-btn" title="ログアウト">
            <i class="fa-solid fa-right-from-bracket"></i>
        </button>
    </div>
</header>

<!-- 1. ログイン -->
<div id="login-view" class="view active center-screen">
    <div class="login-box">
        <h1><i class="fa-solid fa-cube"></i> Knowledge DB</h1>
        <p>IDを入力してログインしてください</p>
        <form id="login-form">
            <input type="text" id="login-id" placeholder="ユーザーID" required>
            <button type="submit" class="primary-btn full-width">ログイン</button>
        </form>
    </div>
</div>

<!-- 2. メニュー -->
<div id="menu-view" class="view center-screen">
    <div class="menu-container">
        <h2>メインメニュー</h2>
        <div class="menu-grid">
            <button onclick="navigate('knowledge')" class="menu-card">
                <i class="fa-solid fa-book-open"></i> <span>ナレッジ入力・検索</span>
            </button>
            <button onclick="navigate('dashboard')" class="menu-card">
                <i class="fa-solid fa-chart-pie"></i> <span>集計ダッシュボード</span>
            </button>
            <button id="admin-btn" style="display:none;" onclick="navigate('admin')" class="menu-card admin-card">
                <i class="fa-solid fa-gears"></i> <span>マスタ管理</span>
            </button>
        </div>
    </div>
</div>

<!-- 3. ナレッジ画面 -->
<div id="knowledge-view" class="view">
    <div class="container">
        <aside class="sidebar">
            <button onclick="navigate('menu')" class="secondary-btn"><i class="fa-solid fa-arrow-left"></i> メニュー</button>
            <div class="spacer" style="height:20px;"></div>
            
            <button id="add-btn" class="primary-btn"><i class="fa-solid fa-plus"></i> 新規作成</button>
            
            <div class="search-box">
                <input type="text" id="search-input" placeholder="キーワード検索...">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>

            <!-- タグクラウド -->
            <div class="tag-cloud-area">
                <h4><i class="fa-solid fa-tags"></i> タグ一覧</h4>
                <div id="sidebar-tag-list"></div>
            </div>
        </aside>

        <main class="main-content">
            <!-- 一覧エリア -->
            <div id="list-area">
                <div class="list-header">
                    <h2 class="page-title">ナレッジ一覧</h2>
                    <button onclick="loadData()" class="secondary-btn reload-btn">
                        <i class="fa-solid fa-rotate-right"></i> 更新
                    </button>
                </div>

                <!-- ★クイックフィルターボタン -->
                <div class="filter-bar">
                    <button class="filter-btn active" onclick="applyFilter('all', this)">全て</button>
                    <button class="filter-btn" onclick="applyFilter('unsolved', this)"><i class="fa-solid fa-circle-exclamation"></i> 未解決</button>
                    <button class="filter-btn" onclick="applyFilter('solved', this)"><i class="fa-solid fa-check"></i> 解決済</button>
                    <button class="filter-btn" onclick="applyFilter('mine', this)"><i class="fa-solid fa-user"></i> 自分の投稿</button>
                </div>

                <div id="knowledge-list"></div>
            </div>

            <!-- エディタエリア -->
            <div id="editor-area" style="display:none;">
                <div class="editor-header">
                    <h3><i class="fa-solid fa-pen"></i> ナレッジ編集</h3>
                    <button id="cancel-btn" class="secondary-btn">閉じる</button>
                </div>
                <form id="knowledge-form">
                    <input type="hidden" id="entry-id">
                    
                    <div class="form-row" style="align-items:center; gap:15px; margin-bottom:15px;">
                        <label class="status-checkbox">
                            <input type="checkbox" id="status-check"> 
                            <span class="status-label">解決済にする</span>
                        </label>
                        <div style="flex:1;">
                            <label style="font-size:0.8rem; font-weight:bold;">タイトル (任意)</label>
                            <input type="text" id="title-input" placeholder="空欄の場合、インシデント名がタイトルになります">
                        </div>
                    </div>
                    
                    <div class="form-row compact-row">
                        <div class="col-item">
                            <label>号機 <span class="required">*</span></label>
                            <input type="text" id="machine-input" placeholder="No.123">
                        </div>
                        <div class="col-item">
                            <label>物件名 <span class="required">*</span></label>
                            <input type="text" id="property-input" placeholder="物件名">
                        </div>
                        <div class="col-item">
                            <label>依頼番号(11桁) <span class="required">*</span></label>
                            <input type="text" id="req-num-input" placeholder="01234567890" maxlength="11">
                        </div>
                    </div>

                    <div class="form-row compact-row">
                        <div class="col-item">
                            <label>インシデント区分 <span class="required">*</span></label>
                            <select id="category-select">
                                <option value="">選択してください</option>
                            </select>
                        </div>
                        <div class="col-item" style="flex:2;">
                            <label>インシデント詳細 (選択追加) <span class="required">*</span></label>
                            <div class="incident-selector">
                                <select id="incident-select">
                                    <option value="">選択してください</option>
                                </select>
                                <div id="selected-incidents" class="selected-chips"></div>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>タグ (#区切り)</label>
                        <input type="text" id="tags-input" placeholder="#js #error">
                    </div>

                    <div class="form-group">
                        <label>内容 <span class="required">*</span></label>
                        <textarea id="content-input" placeholder="詳細を入力..."></textarea>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="primary-btn full-width">保存</button>
                        <button type="button" id="delete-btn" class="danger-btn full-width" style="display:none; margin-top:10px;">
                            <i class="fa-solid fa-trash"></i> 削除
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</div>

<!-- 4. ダッシュボード -->
<div id="dashboard-view" class="view">
    <div class="dashboard-container">
        <div class="dash-header">
            <button onclick="navigate('menu')" class="secondary-btn">戻る</button>
            <h2>データ集計・一覧</h2>
        </div>
        <div class="dash-grid">
            <div class="dash-panel">
                <h3><i class="fa-solid fa-server"></i> 号機別</h3>
                <ul id="machine-list-view"></ul>
            </div>
            <div class="dash-panel">
                <h3><i class="fa-solid fa-triangle-exclamation"></i> インシデント別</h3>
                <ul id="incident-list-view"></ul>
            </div>
        </div>
    </div>
</div>

<!-- 5. マスタ管理 -->
<div id="admin-view" class="view">
    <div class="dashboard-container">
        <div class="dash-header">
            <button onclick="navigate('menu')" class="secondary-btn">戻る</button>
            <h2>マスタ管理</h2>
            <button onclick="saveMasterData()" class="primary-btn" style="margin-left:auto;">
                <i class="fa-solid fa-floppy-disk"></i> 一括保存
            </button>
        </div>

        <div class="dash-grid three-columns">
            <div class="dash-panel">
                <h3>区分マスタ</h3>
                <div class="form-row">
                    <input type="text" id="new-category-input" placeholder="区分名">
                    <button onclick="addCategory()" class="secondary-btn">追加</button>
                </div>
                <ul id="admin-category-list" class="admin-list"></ul>
            </div>

            <div class="dash-panel">
                <h3>インシデントマスタ</h3>
                <div class="form-row">
                    <input type="text" id="new-incident-input" placeholder="インシデント名">
                    <button onclick="addIncident()" class="secondary-btn">追加</button>
                </div>
                <ul id="admin-incident-list" class="admin-list"></ul>
            </div>

            <div class="dash-panel">
                <h3>ユーザーマスタ</h3>
                <div class="form-row compact-row">
                    <input type="text" id="new-user-id" placeholder="ID">
                    <input type="text" id="new-user-name" placeholder="名前">
                    <select id="new-user-role" style="width:80px;">
                        <option value="viewer">View</option>
                        <option value="user">User</option>
                        <option value="manager">Mngr</option>
                        <option value="master">Mstr</option>
                    </select>
                    <button onclick="addUser()" class="secondary-btn">追加</button>
                </div>
                <ul id="admin-user-list" class="admin-list"></ul>
            </div>
        </div>
    </div>
</div>

<div id="loading-overlay" class="loading-overlay">
    <div style="text-align:center;">
        <i class="fa-solid fa-spinner fa-spin" style="font-size:3rem; margin-bottom:10px;"></i>
        <div>Processing...</div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
