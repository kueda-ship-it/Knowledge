<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="ringGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="140" fill="#0f172a"/>
  
  <!-- Network Structure (Background within Lens) -->
  <path d="M180 256 L256 180 L332 256 L256 332 Z" stroke="#60a5fa" stroke-width="4" fill="none" opacity="0.3"/>
  <circle cx="256" cy="180" r="8" fill="#60a5fa" opacity="0.5"/>
  <circle cx="256" cy="332" r="8" fill="#60a5fa" opacity="0.5"/>
  <circle cx="180" cy="256" r="8" fill="#60a5fa" opacity="0.5"/>
  <circle cx="332" cy="256" r="8" fill="#60a5fa" opacity="0.5"/>
  
  <!-- Discovery Lens Frame -->
  <circle cx="256" cy="256" r="140" stroke="url(#ringGrad)" stroke-width="24" fill="none" filter="url(#glow)"/>
  <rect x="350" y="350" width="100" height="24" rx="12" transform="rotate(45 350 350)" fill="#2563eb"/>
  
  <!-- Central Knowledge Spark (Icon A inspiration) -->
  <circle cx="256" cy="256" r="50" fill="#2563eb" opacity="0.8"/>
  <circle cx="256" cy="256" r="25" fill="white">
     <animate attributeName="opacity" values="0.8;0.4;0.8" dur="3s" repeatCount="indefinite" />
     <animate attributeName="r" values="20;28;20" dur="3s" repeatCount="indefinite" />
  </circle>
  
  <!-- Connecting Nodes (Discovery + Connection) -->
  <circle cx="360" cy="150" r="15" fill="#60a5fa"/>
  <path d="M300 200 L360 150" stroke="#60a5fa" stroke-width="6" opacity="0.4"/>
</svg>
